name: Sunucuya Otomatik Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Webhook Tetikle
        run: |
          curl -X POST https://caffe-pos.com/deploy \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
