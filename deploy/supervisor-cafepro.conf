# Reverb WebSocket sunucusu
[program:cafepro-reverb]
process_name=%(program_name)s
command=php /var/www/cafepro/artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/cafepro/storage/logs/reverb.log
stopwaitsecs=3600

# Laravel Zamanlayici (schedule)
[program:cafepro-scheduler]
process_name=%(program_name)s
command=php /var/www/cafepro/artisan schedule:work
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/cafepro/storage/logs/scheduler.log
stopwaitsecs=60
